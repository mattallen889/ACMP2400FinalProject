name: Build and Curl
on:
  workflow_dispatch:
permissions: {}
jobs:
  build-and-curl:
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v7
      - name: docker_build
        run: |
          docker build -t pipeline-test .
      - name: docker_run
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          docker run -d -p 8000:8000 -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" pipeline-test
      - name: curl_ftw
        run: |
          sleep 10
          curl -f http://localhost:8000/


  sbom-scan-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: get_code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: sbom_gen_and_scan
      uses: ./.github/actions/sbom-scan
    - name: upload_sbom
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7
      with:
        name: project-sbom
        path: sbom.json
        compression-level: 0
        
  terraform-stage-1:
    needs: [build-and-curl, sbom-scan-and-test]
    runs-on: ubuntu-latest
    steps:
    - name: get_code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: terraform-stage-1
      uses: ./.github/actions/terraform
      with: 
        ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
        ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        STATE_KEY: 'mattallen'
        TF_STAGE: 'stage1'

  build-tag-push:
    needs: terraform-stage-1
    runs-on: ubuntu-latest
    steps:
    - name: get_code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: acr_login
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: mattallenacmp2400.azurecr.io
        usernmae: ${{ secrets.ARM_CLIENT_ID }}
        password: ${{ secrets.ARM_CLIENT_SECRET }}
    - name: docker_build_tag_push
      run: |
        docker build -t application-final .
        docker tage application-final acrmattallenacmp2400.azurecr.io/final
        docker push acrmattallenacmp2400.azurecr.io/final

  terraform-stage-2:
    needs: build-tag-push
    runs-on: ubuntu-latest
    steps:
    - name: get_code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: terraform-stage-2
      uses: ./.github/actions/terraform
      with: 
        ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
        ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        STATE_KEY: 'mattallen'
        TF_STAGE: 'stage2'
        DJANGO_SECRET_KEY_PROD: ${{ secrets.DJANGO_SECRET_KEY_PROD }}

  pre-eval:
    needs: terraform-stage-2
    runs-on: ubuntu-latest
    steps:
    - name: get_code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: get_container_dns
      run: |
        cd stage2/
        prefix=$(grep 'dns_name_label' main.tf | cut -d '=' -f2 | tr -d '"' | xargs)
        sleep 50
        curl -f http://$prefix.centralus.azurecontainer.io:8000
        
    
    
    
